# CL WP Sentinel - Site Configuration Example
# ─────────────────────────────────────────────────────────────────────────────
# One file per site, stored in /etc/cl-wp-sentinel/sites/
# Filename convention: {SITE_NAME}.conf
#
# To add a new site manually:
#   1. Copy this file to /etc/cl-wp-sentinel/sites/mysite.conf
#   2. Edit the values below
#   3. Run: cl-wp-sentinel-update-baseline --site=mysite
# ─────────────────────────────────────────────────────────────────────────────

# Internal identifier — used in alerts, log entries, and filenames.
# Use only letters, numbers, underscores and hyphens. No spaces.
SITE_NAME="example_com"

# Absolute path to the WordPress installation root (where wp-config.php lives).
# GridPane convention: /var/www/DOMAIN/htdocs
SITE_PATH="/var/www/example.com/htdocs"

# Domain shown in Telegram alert messages.
SITE_DOMAIN="example.com"

# ─── New-file monitoring ──────────────────────────────────────────────────────
# Directories inside wp-content/ that are EXCLUDED from new-file detection.
# These are dynamic/cache directories where new files are expected and normal.
# Space-separated list of directory names (not full paths).
#
# Common values:
#   uploads         — user-uploaded media (always exclude)
#   cache           — WP Super Cache, W3 Total Cache
#   et-cache        — Divi / Elegant Themes cache
#   wpo-cache       — WP Optimize cache
#   w3tc            — W3 Total Cache
#   litespeed       — LiteSpeed Cache
#   wp-rocket-cache — WP Rocket
EXCLUDED_DIRS="uploads cache et-cache"

# ─── Watched file integrity ───────────────────────────────────────────────────
# Files (relative to SITE_PATH) whose SHA-256 checksum AND modification time
# are monitored. An alert fires if either changes unexpectedly.
#
# Good candidates:
#   wp-config.php   — database credentials, salts, debug settings
#   .htaccess       — Apache rewrite rules
#   wp-login.php    — login page (common target for injection)
#   index.php       — root index (sometimes used for redirects by malware)
#   wp-settings.php — core bootstrap
WATCHED_FILES=(
    wp-config.php
    .htaccess
    wp-login.php
    index.php
)
